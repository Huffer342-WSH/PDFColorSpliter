name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Build executable
        run: uv run build --clean

      - name: Package executable
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ github.sha }}" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive `
            -Path dist/PDFColorSpliter.exe `
            -DestinationPath "artifacts/PDFColorSpliter-$version-windows-x64.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFColorSpliter-windows-x64
          path: artifacts/*.zip
          if-no-files-found: error

      - name: Decide release type by tag name
        if: github.ref_type == 'tag'
        id: classify
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ($tagName -match "-((alpha|beta|rc|pre|preview)([.-][0-9A-Za-z]+)*)$") {
            "release_type=prerelease" >> $env:GITHUB_OUTPUT
            "prerelease=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          "release_type=stable" >> $env:GITHUB_OUTPUT
          "prerelease=false" >> $env:GITHUB_OUTPUT

      - name: Setup Node.js
        if: github.ref_type == 'tag'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate release notes
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $extraArgs = @()
          if ("${{ steps.classify.outputs.prerelease }}" -eq "true") {
            $extraArgs += "--prerelease"
          }

          npx --yes changelogithub `
            --capitalize `
            --group `
            --contributors `
            --name "${{ github.ref_name }}" `
            --output RELEASE_NOTES.md `
            @extraArgs

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.classify.outputs.prerelease }}
          body_path: RELEASE_NOTES.md
          files: artifacts/*.zip
